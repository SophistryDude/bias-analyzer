services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mediasentinel
      POSTGRES_PASSWORD: mediasentinel_dev
      POSTGRES_DB: mediasentinel
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
